name: Deploy NestJS BE

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push BE Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ggreen-be:latest

      - name: 🚀 Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ggreen-be:latest
            
            docker stop ggreen-be || true
            docker rm ggreen-be || true
            
            # 💡 จุดที่เปลี่ยน: เพิ่ม -e เพื่อฉีดตัวแปร .env เข้าไปใน Docker
            # -e PORT=4000 บังคับให้ NestJS รันพอร์ต 4000
            docker run -d --name ggreen-be -p 4000:4000 \
              -e PORT=4000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN }}" \
              --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/ggreen-be:latest
            
            docker image prune -f